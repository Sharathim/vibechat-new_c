<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeChat — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAFAFA;
      color: #0F0F14;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 16px;
    }
    .icon { font-size: 64px; }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #7C3AED;
    }
    p { font-size: 15px; color: #6B7280; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      background: #7C3AED;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🎵</div>
  <h1>You are offline</h1>
  <p>
    VibeChat needs an internet connection to stream music
    and send messages. Check your connection and try again.
  </p>
  <button onclick="window.location.reload()">
    Try Again
  </button>
</body>
</html>
